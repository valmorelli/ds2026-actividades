<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>ABM de libros</title>
    </head>
    <body>
        <header>
            <h1>ABM de libros</h1>
        </header>
        <main>
            
            <input type="text" id="filtroAutor" placeholder="Filtrar por autor">
            <button id="filtrar">Filtrar</button>
            <button id="mostrarDisponibles">Solo disponibles</button>
            <button id="mostrarTodos">Ver todos</button>
            
            <ul id="listado"></ul>
            <p id="stats"> </p>
            <hr>
            <h2>Agregar nuevo libro</h2>
            <div id="error" style="color: red;"></div>
            <form id="formularioLibro">
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" placeholder="Nombre del libro" required>

                <label for="autor">Autor:</label>
                <input type="text" id="autor"  placeholder="Nombre del autor" required>

                <label for="disponible">Disponible:</label>
                <input type="checkbox" id="disponible">

                <label for="precio">Precio:</label>
                <input type="number" id="precio" name="Precio" placeholder="Precio del libro" required>

                <label for="genero">Genero (Opcional):</label>
                <input type="text" id="genero" placeholder="Ej: Terror, Romance, etc.">

                <button type="button" id="botonAgregar">Agregar Libro</button>
            </form>
        </main>
        <script src="app.js"></script>
    </body>
</html>
